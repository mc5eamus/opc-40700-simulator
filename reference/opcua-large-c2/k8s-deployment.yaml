# opcua-large-c2 -- native open62541 simulator hosting MCC11420/50/70/90.
#
# Each pod runs one MCC variant on its own port. The native C server
# loads ~7K-50K nodes from pre-compiled nodeset C source in <1 second
# and serves the AIO commander discovery browse far below the
# hardcoded ~5 minute budget.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opcua-large-c2-mcc11420
  namespace: azure-iot-operations
  labels: { app: opcua-large-c2-mcc11420 }
spec:
  replicas: 1
  selector: { matchLabels: { app: opcua-large-c2-mcc11420 } }
  template:
    metadata: { labels: { app: opcua-large-c2-mcc11420 } }
    spec:
      containers:
        - name: opcua-large-c2-sim
          image: opcua-large-c2:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 4840, name: opc-tcp }]
          env:
            - { name: MCC_VARIANT, value: "MCC11420" }
          resources:
            requests: { cpu: "200m", memory: 256Mi }
            limits:   { cpu: "1",    memory: 1Gi }
          startupProbe:   { tcpSocket: { port: 4840 }, initialDelaySeconds: 1, periodSeconds: 2, failureThreshold: 30 }
          readinessProbe: { tcpSocket: { port: 4840 }, periodSeconds: 10 }
          livenessProbe:  { tcpSocket: { port: 4840 }, periodSeconds: 30 }
---
apiVersion: v1
kind: Service
metadata:
  name: opcua-large-mcc11420
  namespace: azure-iot-operations
spec:
  selector: { app: opcua-large-c2-mcc11420 }
  ports: [{ name: opc-tcp, port: 4840, targetPort: 4840 }]
  type: ClusterIP
---
