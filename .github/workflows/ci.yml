name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build crate
        run: cargo build --release

      - name: Run cargo tests
        run: cargo test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: test-client/package-lock.json

      - name: Install test client dependencies
        working-directory: test-client
        run: npm ci

      - name: Start OPC UA server
        run: |
          RUST_LOG=info ./target/release/opc-40700-simulator &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> "$GITHUB_ENV"
          # Wait for the server to start accepting connections
          for i in $(seq 1 30); do
            if nc -z localhost 5000 2>/dev/null; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run test client
        working-directory: test-client
        run: npx ts-node src/client.ts

      - name: Stop OPC UA server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill "$SERVER_PID" || true
          fi
